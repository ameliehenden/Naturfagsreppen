name: Sjekk teller (engangs)

on:
  workflow_dispatch:

jobs:
  sjekk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Sjekk GoatCounter siste 30 dager
        run: node scripts/sjekk-teller.mjs
        env:
          GOATCOUNTER_TOKEN: ${{ secrets.GOATCOUNTER_TOKEN }}
