name: Daglig rapport

on:
  schedule:
    # 05:00 UTC ≈ 07:00 norsk sommertid (06:00 om vinteren)
    - cron: '0 5 * * *'
  workflow_dispatch: # gjør at den også kan kjøres manuelt

permissions:
  issues: write

jobs:
  rapport:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Hent tall fra GoatCounter
        run: node scripts/daglig-rapport.mjs
        env:
          GOATCOUNTER_TOKEN: ${{ secrets.GOATCOUNTER_TOKEN }}
      - name: Lag GitHub-sak med rapporten (tildelt Amelie -> e-post)
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh issue create
          --repo ${{ github.repository }}
          --title "$(cat tittel.txt)"
          --body-file rapport.md
          --assignee ameliehenden
